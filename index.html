<!DOCTYPE html>
<html>
<head>
  <title>Download App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background: linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
      text-align:center;
    }

    .container {
      margin-top:100px;
    }

    .card {
      background:#1e293b;
      padding:25px;
      border-radius:15px;
      width:90%;
      max-width:360px;
      margin:auto;
      box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    .logo {
      width:90px;
      border-radius:20px;
      margin-bottom:10px;
    }

    h2 {
      margin:10px 0;
    }

    .info {
      font-size:14px;
      opacity:0.8;
    }

    .btn {
      margin-top:20px;
      background:#22c55e;
      padding:15px;
      width:100%;
      border:none;
      border-radius:12px;
      font-size:18px;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover {
      background:#16a34a;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">

    <img src="https://via.placeholder.com/90" class="logo">

    <h2>🔥 DIWA SLOT</h2>
    <p class="info">Latest Version Available</p>

    <a href="https://drive.google.com/uc?export=download&id=1idfyQ-1E35FbRSpK6Y1Uf3dpH9sNqWOw">
      <button class="btn">📥 Download Now</button>
    </a>

  </div>

</div>

</body>
</html>
